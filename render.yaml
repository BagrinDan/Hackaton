

databases:
  - name: hotel-db
    databaseName: hotel
    user: hotel_user
    plan: free                  

  - name: beach-db
    databaseName: beach
    user: beach_user
    plan: free

services:
  # ── Frontend ──────────────────────────────────────────────
  - type: web
    name: frontend
    runtime: docker
    dockerfilePath: ./frontend/Dockerfile
    plan: free
    envVars:
      - key: VITE_GATEWAY_URL
        fromService:
          name: gateway
          type: web
          property: host          # !!!

  # ── Gateway ───────────────────────────────────────────────
  - type: web
    name: gateway
    runtime: docker
    dockerfilePath: ./gateway/Dockerfile
    plan: free
    envVars:
      - key: AIRPORT_URL
        fromService:
          name: airport
          type: web
          property: host
      - key: HOTEL_URL
        fromService:
          name: hotel
          type: web
          property: host
      - key: BEACH_URL
        fromService:
          name: beach
          type: web
          property: host
      - key: PARROT_URL
        fromService:
          name: parrot
          type: web
          property: host
      - key: BROADCAST_URL
        fromService:
          name: broadcast
          type: web
          property: host

  # ── Airport ───────────────────────────────────────────────
  - type: web
    name: airport
    runtime: docker
    dockerfilePath: ./airport/Dockerfile
    plan: free
    envVars:
      - key: DATABASE_URL
        value: sqlite:///./data/airport.db
      - key: BROADCAST_URL
        fromService:
          name: broadcast
          type: web
          property: host

  # ── Hotel ─────────────────────────────────────────────────
  - type: web
    name: hotel
    runtime: docker
    dockerfilePath: ./hotel/Dockerfile
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: hotel-db
          property: connectionString
      - key: BROADCAST_URL
        fromService:
          name: broadcast
          type: web
          property: host

  # ── Beach ─────────────────────────────────────────────────
  - type: web
    name: beach
    runtime: docker
    dockerfilePath: ./beach/Dockerfile
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: beach-db
          property: connectionString
      - key: BROADCAST_URL
        fromService:
          name: broadcast
          type: web
          property: host

  # ── Parrot ────────────────────────────────────────────────
  - type: web
    name: parrot
    runtime: docker
    dockerfilePath: ./parrot/Dockerfile
    plan: free
    envVars:
      - key: AIRPORT_URL
        fromService:
          name: airport
          type: web
          property: host
      - key: HOTEL_URL
        fromService:
          name: hotel
          type: web
          property: host
      - key: OPENAI_API_KEY
        sync: false              # введи вручную в дашборде Render

  # ── Broadcast (SSE) ───────────────────────────────────────
  - type: web
    name: broadcast
    runtime: docker
    dockerfilePath: ./broadcast/Dockerfile
    plan: free
    # SSE требует HTTP/1.1 keep-alive — Render поддерживает из коробки.
    # Убедись что сервер НЕ буферизует ответы (res.flush() / chunk encoding).